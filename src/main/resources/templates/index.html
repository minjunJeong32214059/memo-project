<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메모정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/">메모정</a>
            <div class="d-flex align-items-center">
                <span class="me-3 text-secondary fw-bold">
                    <i class="bi bi-person-circle text-primary"></i> 
                    <span th:text="${#authentication.name}">사용자</span>님
                </span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">로그아웃</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-primary">📝 메모정</h1>
            <p class="text-secondary">당신의 소중한 생각을 기록하세요</p>
        </div>

        <div class="form-section">
            <h5 class="mb-4 fw-bold text-dark"><i class="bi bi-pencil-square me-2"></i>새 메모 작성</h5>
			<form action="/save" method="post" enctype="multipart/form-data"> <div class="mb-3">
			        <input type="text" name="title" class="form-control form-control-lg border-0 bg-light" placeholder="제목을 입력하세요" required>
			    </div>
			    <div class="mb-3">
			        <textarea name="content" class="form-control border-0 bg-light" rows="4" placeholder="당신의 생각을 기록해보세요"></textarea>
			    </div>
			    
				<div class="mb-3">
				    <label class="form-label text-secondary small fw-bold">
				        <i class="bi bi-image me-1"></i>이미지 첨부 (선택)
				    </label>
				    <input type="file" name="file" class="form-control border-0 bg-light shadow-sm custom-file-input">
				</div>

			    <div class="text-end">
			        <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm rounded-pill">저장하기</button>
			    </div>
			</form>
        </div>

        <div class="row mb-4 align-items-center">
            <div class="col-md-5">
                <h4 class="fw-bold m-0">
                    저장된 메모 
                    <span class="badge rounded-pill bg-primary ms-2" th:text="${memos.size()}">0</span>
                </h4>
            </div>
            <div class="col-md-7">
                <form action="/" method="get" class="d-flex gap-2 justify-content-end">
                    <div class="input-group shadow-sm overflow-hidden rounded-pill" style="width: 80%;">
                        <span class="input-group-text"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" name="keyword" class="form-control border-0 ps-0" placeholder="제목 검색..." th:value="${param.keyword}">
                        <button type="submit" class="btn btn-white border-start text-primary fw-bold">검색</button>
                    </div>
                    <a href="/" class="btn btn-light shadow-sm rounded-circle" title="초기화"><i class="bi bi-arrow-clockwise"></i></a>
                </form>
            </div>
        </div>

        <div class="memo-list">
            <div th:if="${#lists.isEmpty(memos)}" class="text-center py-5 text-muted bg-white rounded-4 shadow-sm border">
                <i class="bi bi-folder-x display-4 mb-3 d-block"></i>
                <p class="h5" th:text="${param.keyword != null} ? '검색어와 일치하는 메모가 없습니다.' : '아직 작성된 메모가 없어요.'"></p>
                <a th:if="${param.keyword != null}" href="/" class="btn btn-link">전체 보기</a>
            </div>
            
			<div th:each="memo : ${memos}" class="card memo-card mb-4 shadow-sm">
			    <div class="card-body p-4">
			        <div class="d-flex justify-content-between align-items-start">
			            <div class="w-75">
			                <h5 class="card-title fw-bold text-dark mb-1" th:text="${memo.title}">제목</h5>
			                
			                <div th:if="${memo.fileName != null}" class="my-3 text-center">
			                    <img th:src="@{|/files/${memo.fileName}|}" class="img-fluid rounded-3 shadow-sm" style="max-height: 300px;">
			                </div>

			                <p class="card-text text-secondary mb-3" th:text="${memo.content}">내용</p>
                
                            <div class="d-flex align-items-center gap-3">
                                <small class="text-muted"><i class="bi bi-calendar3 me-1"></i>[[${#temporals.format(memo.createdAt, 'yyyy-MM-dd HH:mm')}]]</small>
                                <span class="badge bg-light text-dark border-0 py-2 px-3 rounded-pill">
                                    <i class="bi bi-person-fill me-1 text-primary"></i> 
                                    <span th:text="${memo.author != null ? memo.author.username : '익명'}">작성자</span>
                                </span>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <a th:href="@{'/edit/' + ${memo.id}}" class="btn btn-outline-primary btn-sm rounded-pill px-3">수정</a>
                            <a th:href="@{'/delete/' + ${memo.id}}" 
                               onclick="return confirm('정말 삭제하시겠습니까?')" 
                               class="btn btn-outline-danger btn-sm rounded-pill px-3">삭제</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
