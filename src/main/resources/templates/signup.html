<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 메모정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card p-4 shadow" style="width: 100%; max-width: 400px; border-radius: 15px;">
            <h2 class="text-center mb-4 fw-bold text-primary">📝 회원가입</h2>
            <form th:action="@{/user/signup}" method="post">
                <div class="mb-3">
                    <label class="form-label">사용자 아이디</label>
                    <input type="text" name="username" class="form-control" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">이메일 주소</label>
                    <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">비밀번호</label>
                    <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">가입하기</button>
            </form>
            <div class="text-center mt-3">
                <a th:href="@{/login}" class="small text-muted text-decoration-none">이미 계정이 있으신가요? 로그인</a>
            </div>
        </div>
    </div>
</body>
</html>
