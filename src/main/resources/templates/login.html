<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 메모정 </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card login-card p-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">📝 로그인</h2>
            <p class="text-muted">마음껏 작성하고, 마음을 비우세요</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger p-2 small text-center">
            다시 한번 잘 생각해보세요.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">아이디</label>
                <input type="text" name="username" class="form-control" placeholder="아이디를 입력하세요" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">비밀번호</label>
                <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-2">로그인하기</button>
        </form>
    </div>
</body>
</html>
